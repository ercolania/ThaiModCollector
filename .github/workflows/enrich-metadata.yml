name: Enrich Game Metadata
on:
  schedule:
    - cron: '0 3 * * *'   # daily at 03:00 UTC
  workflow_dispatch: {}    # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch missing metadata from the Steam Store API and commit
        id: enrich
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Writes a games array as one compact line per game — e.g.
            // [730, "Counter-Strike 2", 5174842, 0, [1, 37]] — instead of the
            // standard JSON.stringify(x, null, 2) output, which spreads every
            // nested array element across its own line and is much harder to
            // skim through by eye.
            function formatGameArray(games) {
              const lines = games.map(g => '  ' + JSON.stringify(g).replace(/,(?!\s)/g, ', '));
              return '[\n' + lines.join(',\n') + '\n]\n';
            }

            // Genre entries this repo already knows about, keyed by Steam's genre id.
            // New genre ids encountered below get appended here automatically.
            const genresPath = 'data/genres.json';
            const genres = JSON.parse(fs.readFileSync(genresPath, 'utf8'));

            async function fetchAppDetails(appId) {
              const url = `https://store.steampowered.com/api/appdetails?appids=${appId}&cc=th&l=thai`;
              const res = await fetch(url);
              if (!res.ok) return null;
              const json = await res.json();
              const entry = json[String(appId)];
              if (!entry || !entry.success || !entry.data) return null;
              return entry.data;
            }

            async function enrichFile(path) {
              const games = JSON.parse(fs.readFileSync(path, 'utf8'));
              let updatedCount = 0;

              for (const game of games) {
                const [appId, name] = game;
                if (name !== null) continue; // already has metadata

                try {
                  const data = await fetchAppDetails(appId);
                  if (!data) {
                    console.log(`⚠️ No Steam data for appId ${appId} (${path}) — leaving as-is for next run`);
                    continue;
                  }

                  const reviews = data.recommendations?.total ?? 0;
                  const price = data.is_free ? 0 : (data.price_overview?.final ?? 0) / 100;
                  const genreIds = (data.genres || []).map(g => {
                    const id = Number(g.id);
                    if (!genres[String(id)]) genres[String(id)] = g.description;
                    return id;
                  });

                  game[1] = data.name;
                  game[2] = reviews;
                  game[3] = price;
                  game[4] = genreIds;
                  updatedCount++;

                  // Steam's API is rate-limited — a short delay avoids tripping it
                  // when many entries need enrichment in the same run.
                  await new Promise(r => setTimeout(r, 1500));
                } catch (err) {
                  console.log(`⚠️ Failed to fetch appId ${appId} (${path}): ${err.message}`);
                }
              }

              if (updatedCount > 0) {
                // Re-sort by review count, most-reviewed first, so entries that
                // just got their real numbers filled in land in the right rank
                // instead of staying at their original insertion position.
                games.sort((a, b) => (b[2] ?? 0) - (a[2] ?? 0));
                fs.writeFileSync(path, formatGameArray(games));
              }
              return updatedCount;
            }

            const officialUpdated = await enrichFile('data/official.json');
            const moddedUpdated = await enrichFile('data/modded.json');
            fs.writeFileSync(genresPath, JSON.stringify(genres, null, 2) + '\n');

            const totalUpdated = officialUpdated + moddedUpdated;
            core.setOutput('updatedCount', String(totalUpdated));
            console.log(`✅ Enriched ${totalUpdated} entr(y/ies) total`);

      - name: Commit changes
        if: steps.enrich.outputs.updatedCount != '0'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Enrich game metadata (${{ steps.enrich.outputs.updatedCount }} entries) [automated]"
          file_pattern: 'data/official.json data/modded.json data/genres.json'
