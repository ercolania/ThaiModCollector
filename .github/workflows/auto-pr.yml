name: Auto Create PR from Issue
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build:
    if: contains(github.event.issue.labels.*.name, 'mod-submission')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Data
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const appIdMatch = body.match(/\*\*App ID เกม:\*\*\s*(\d+)/);
            const linkMatch = body.match(/\*\*ลิงก์ดาวน์โหลด:\*\*\s*(https?:\/\/[^\s]+)/);
            
            if (appIdMatch && linkMatch) {
              core.setOutput('appId', appIdMatch[1]);
              core.setOutput('link', linkMatch[1]);
            } else {
              core.setFailed("ข้อมูลไม่ถูกต้อง");
            }

      - name: Update mods.json and Sort
        run: |
          jq --sort-keys \
             --arg id "${{ steps.extract.outputs.appId }}" \
             --arg link "${{ steps.extract.outputs.link }}" \
             '.mods[$id] = $link | .last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ"))' mods.json > tmp.json && mv tmp.json mods.json

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add mod for App ID ${{ steps.extract.outputs.appId }}"
          branch: "add-mod-${{ steps.extract.outputs.appId }}"
          title: "✨ อัปเดตม็อด: App ID ${{ steps.extract.outputs.appId }}"
          body: "ดึงข้อมูลจาก Issue #${{ github.event.issue.number }}\nลิงก์: ${{ steps.extract.outputs.link }}"
          labels: "mod-update"

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });