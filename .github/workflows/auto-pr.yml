name: Auto Create PR from Issue
on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-mod:
    # ทำงานเมื่อเป็นกระทู้เสนอม็อด หรือ แจ้งลิงก์เสีย เท่านั้น
    if: contains(github.event.issue.labels.*.name, 'mod-submission') || contains(github.event.issue.labels.*.name, 'broken-link')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Extract Data From Issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const gameMatch = body.match(/\*\*ชื่อเกม:\*\*\s*(.+)/);
            const appIdMatch = body.match(/\*\*App ID เกม:\*\*\s*(\d+)/);
            const linkMatch = body.match(/\*\*ลิงก์ดาวน์โหลด:\*\*\s*(https?:\/\/[^\s]+)/);
            
            if (appIdMatch) {
              core.setOutput('gameName', gameMatch ? gameMatch[1].trim() : "Unknown Game");
              core.setOutput('appId', appIdMatch[1]);
              core.setOutput('link', linkMatch ? linkMatch[1] : "none");
            } else {
              core.setFailed("❌ ดึงข้อมูล App ID ไม่สำเร็จ");
            }

      - name: Update mods.json (กรณีเพิ่มม็อดใหม่ ✨)
        if: contains(github.event.issue.labels.*.name, 'mod-submission')
        run: |
          jq --arg id "${{ steps.extract.outputs.appId }}" \
             --arg link "${{ steps.extract.outputs.link }}" \
             '.mods[$id] = $link | .mods |= (to_entries | sort_by(.key | tonumber) | from_entries) | .last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ"))' mods.json > tmp.json && mv tmp.json mods.json

      - name: Update mods.json (กรณีแจ้งลบลิงก์เสีย 🗑️)
        if: contains(github.event.issue.labels.*.name, 'broken-link')
        run: |
          jq --arg id "${{ steps.extract.outputs.appId }}" \
             'del(.mods[$id]) | .last_updated = (now | strftime("%Y-%m-%dT%H:%M:%SZ"))' mods.json > tmp.json && mv tmp.json mods.json

      - name: Create Pull Request 🚀
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update mod for ${{ steps.extract.outputs.gameName }} (${{ steps.extract.outputs.appId }})"
          branch: "update-mod-${{ steps.extract.outputs.appId }}"
          title: "🤖 อัปเดตข้อมูลม็อด: ${{ steps.extract.outputs.gameName }} (${{ steps.extract.outputs.appId }})"
          body: |
            สร้าง PR อัตโนมัติจาก Issue #${{ github.event.issue.number }}
            กรุณาตรวจสอบความถูกต้องก่อนกด Merge
          labels: "mod-update"

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });