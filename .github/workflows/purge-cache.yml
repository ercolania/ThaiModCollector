name: Auto Purge jsDelivr Cache

# จุดชนวน: ทำงานเมื่อมีการ Push หรือ Merge ไฟล์ลง branch 'main'
on:
  push:
    branches:
      - main
    paths:
      - 'mods.json' # ทำงานเฉพาะเมื่อไฟล์นี้มีการเปลี่ยนแปลงเท่านั้น

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Purge CDN Cache
        run: |
          echo "กำลังสั่งล้างแคชบน jsDelivr..."
          curl -s https://purge.jsdelivr.net/gh/ercolania/ThaiModCollector@main/mods.json
          echo "ล้างแคชเรียบร้อย! ผู้ใช้จะได้ข้อมูลใหม่ทันที"