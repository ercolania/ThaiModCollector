name: Auto Purge jsDelivr Cache

on:
  push:
    branches:
      - main
    paths:
      - 'data/links.json'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge CDN cache
        run: |
          echo "Waiting for GitHub's origin server to update (3 min)..."
          sleep 180

          echo "Purging jsDelivr cache..."
          curl -s https://purge.jsdelivr.net/gh/ercolania/ThaiModCollector@main/links.json

          echo "Cache purged — users will get fresh data immediately."
